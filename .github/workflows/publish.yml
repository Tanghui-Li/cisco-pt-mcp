name: Publish to PyPI

# Publishes the package to PyPI via OIDC Trusted Publishing when a
# version tag (e.g. v0.1.0) is pushed, or when manually dispatched
# from the Actions tab. No API tokens stored in the repo.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build distributions
        run: python -m build

      - name: Verify metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # `environment` ties this job to the GitHub environment configured
    # on the PyPI trusted-publisher form. PyPI rejects the OIDC token
    # if the environment name doesn't match.
    environment:
      name: pypi
      url: https://pypi.org/p/cisco-pt-mcp
    permissions:
      # Required for OIDC token exchange with PyPI.
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish via OIDC Trusted Publisher
        uses: pypa/gh-action-pypi-publish@release/v1
